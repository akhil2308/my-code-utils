version: '3.8'

# S3-compatible object storage for local dev — test Python/s3/s3_client.py
# against this without touching real AWS.
#   API:     http://localhost:9000   (point boto3 endpoint_url here)
#   Console: http://localhost:9001   (login: minioadmin / minioadmin)
#
# boto3 example:
#   boto3.client("s3", endpoint_url="http://localhost:9000",
#                aws_access_key_id="minioadmin",
#                aws_secret_access_key="minioadmin")

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
