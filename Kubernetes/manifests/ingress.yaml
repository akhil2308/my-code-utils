# Ingress: HTTP(S) routing from outside the cluster to a Service.
# Requires an ingress controller (e.g. ingress-nginx) installed in the cluster.
#   kubectl apply -f ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: demo.example.com        # point this DNS at the controller's LB IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app      # -> service.yaml
                port:
                  number: 80
  # TLS: create the secret first ->
  #   kubectl create secret tls demo-tls --cert=tls.crt --key=tls.key
  tls:
    - hosts:
        - demo.example.com
      secretName: demo-tls
